name: Appium Enterprise CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - regression
          - contract

env:
  NODE_VERSION: '20'
  APPIUM_VERSION: '2.x'

# ============================================================
# STAGE 1: SETUP
# ============================================================
jobs:
  setup:
    name: Setup & Dependency Installation
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Appium globally
        run: npm install -g appium@${{ env.APPIUM_VERSION }}

      - name: Install required Appium drivers
        run: |
          appium driver install uiautomator2
          appium driver install xcuitest

      - name: Compile TypeScript
        run: npx tsc --noEmit

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-framework
          path: |
            src/
            package.json
            wdio*.ts
          retention-days: 1

# ============================================================
# STAGE 2: CONTRACT VALIDATION (HARD GATE — FAIL FAST)
# ============================================================
  contract-validation:
    name: Contract Validation Gate (Hard Gate)
    runs-on: ubuntu-latest
    needs: setup
    environment: ci
    env:
      APPIUM_SERVER_URL: ${{ secrets.APPIUM_SERVER_URL }}
      DEVICE_FARM_URL: ${{ secrets.DEVICE_FARM_URL }}
      ENABLE_QUARANTINE: 'false'
      ENABLE_TELEMETRY: 'true'
      RETRY_LIMIT: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Run Contract Compliance Validation
        run: npx ts-node ci-runner.ts --suite contract
        timeout-minutes: 15

      - name: Upload contract violation report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-violation-report
          path: reports/

# ============================================================
# STAGE 3: SMOKE TESTS (PARALLEL)
# ============================================================
  smoke-tests:
    name: Smoke Test Suite (Parallel)
    runs-on: ubuntu-latest
    needs: contract-validation
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    environment: ci
    env:
      APPIUM_SERVER_URL: ${{ secrets.APPIUM_SERVER_URL }}
      DEVICE_FARM_URL: ${{ secrets.DEVICE_FARM_URL }}
      PARALLEL_INSTANCES: '2'
      ENABLE_QUARANTINE: 'true'
      ENABLE_TELEMETRY: 'true'
      RETRY_LIMIT: '2'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Run Smoke Suite (Shard ${{ matrix.shard }})
        run: npx ts-node ci-runner.ts --suite smoke --shard ${{ matrix.shard }}
        timeout-minutes: 30

      - name: Upload smoke screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots-shard-${{ matrix.shard }}
          path: screenshots/

      - name: Upload smoke telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-telemetry-shard-${{ matrix.shard }}
          path: reports/

# ============================================================
# STAGE 4: REGRESSION SUITE
# ============================================================
  regression-tests:
    name: Regression Test Suite
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: ci
    env:
      APPIUM_SERVER_URL: ${{ secrets.APPIUM_SERVER_URL }}
      DEVICE_FARM_URL: ${{ secrets.DEVICE_FARM_URL }}
      PARALLEL_INSTANCES: '4'
      ENABLE_QUARANTINE: 'true'
      ENABLE_TELEMETRY: 'true'
      RETRY_LIMIT: '3'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Restore quarantine store from previous run
        uses: actions/cache@v4
        with:
          path: .quarantine-store.json
          key: quarantine-store-${{ github.ref }}
          restore-keys: |
            quarantine-store-

      - name: Run Regression Suite
        run: npx ts-node ci-runner.ts --suite regression
        timeout-minutes: 60

      - name: Upload regression screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots
          path: screenshots/

      - name: Upload regression telemetry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-telemetry
          path: reports/

# ============================================================
# STAGE 5: FLAKY QUARANTINE EVALUATION
# ============================================================
  quarantine-evaluation:
    name: Flaky Test Quarantine Report
    runs-on: ubuntu-latest
    needs: regression-tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Restore quarantine store
        uses: actions/cache@v4
        with:
          path: .quarantine-store.json
          key: quarantine-store-${{ github.ref }}
          restore-keys: |
            quarantine-store-

      - name: Generate Quarantine Report
        run: npx ts-node ci-runner.ts --generate-quarantine-report
        continue-on-error: true

      - name: Persist updated quarantine store
        uses: actions/cache/save@v4
        with:
          path: .quarantine-store.json
          key: quarantine-store-${{ github.ref }}-${{ github.run_id }}

      - name: Upload quarantine report artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-report
          path: reports/quarantine-report.json

# ============================================================
# STAGE 6: TELEMETRY AGGREGATION
# ============================================================
  telemetry-aggregation:
    name: Telemetry Aggregation & Upload
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all telemetry artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-telemetry*'
          merge-multiple: true
          path: reports/

      - name: Upload aggregated telemetry
        uses: actions/upload-artifact@v4
        with:
          name: execution-telemetry-full
          path: reports/
          retention-days: 30

# ============================================================
# STAGE 7: ALLURE REPORTING
# ============================================================
  allure-reporting:
    name: Allure Report Generation
    runs-on: ubuntu-latest
    needs: telemetry-aggregation
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-telemetry*'
          merge-multiple: true
          path: allure-results/

      - name: Download screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: '*-screenshots*'
          merge-multiple: true
          path: allure-results/screenshots/
        continue-on-error: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@v1
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history

      - name: Publish Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
